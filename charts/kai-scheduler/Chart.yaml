apiVersion: v2
name: kai-scheduler
description: >-
  Phase 5 — KAI Scheduler config: the queue hierarchy (org -> serving-interactive /
  serving-batch / aux-cpu) and the serving/batch PriorityClasses. The KAI engine itself
  is the upstream chart, referenced as an optional dependency (off by default for
  disconnected installs — mirror it, or git clone/helm pull into charts/). One quota brain.
type: application
version: 0.1.0
appVersion: "0.x"
keywords: [openshift, kai-scheduler, gang-scheduling, queues, runai]
# This chart ships ONLY our config (queues + priority classes) so it renders standalone.
# The KAI engine is installed separately from its mirrored/cloned chart — see values.yaml
# `upstream:` and README. To vendor it as a subchart instead, add a `dependencies:` stanza
# pointing at your mirror, drop the chart into charts/, and run `helm dependency build`.
