# Phase 1 — Node foundation (kernel tuning). Source: glm51-openshift-deployment.md §1, §10.
# Run one release per CPU SKU if core counts differ (H200/Intel vs Blackwell/EPYC);
# the cpusets below are the §1.2 example for a 2x56-core node.

pool:
  name: gpu-hpc          # MachineConfigPool name + MCP selector label
  roleLabel: gpu-hpc     # node-role.kubernetes.io/<roleLabel>=""  — §10 invariant

performanceProfile:
  enabled: true
  name: gpu-hpc
  cpu:
    # 8 cores/socket reserved on BOTH sockets (per-NUMA memory + NIC IRQ steering). §10
    # Assumes 112 logical CPUs = SMT off (§1.5). If SMT is on, reserved/isolated must
    # contain complete sibling pairs or full-pcpus-only rejects the GPU pods.
    reserved: "0-7,56-63"
    isolated: "8-55,64-111"
  numa:
    # best-effort, NOT single-numa-node: pods are full-node (8 GPU + 8 VF) and span
    # both sockets; single-numa-node would reject them at admission. §1.2 decision.
    topologyPolicy: best-effort
  hugepages:
    # Small on purpose. KVBM host tier uses CUDA pinned (page-locked) memory, NOT
    # hugetlbfs; large reservations steal RAM from the tier being built. §1.2 / §10.
    defaultSize: "1G"
    pages:
      - size: "1G"
        count: 16
  # Pinned explicitly (values ARE the NTO defaults) because the pruned arg list below
  # depends on them: realTime=true is what makes NTO generate the low-latency args.
  workloadHints:
    realTime: true
    highPowerConsumption: false   # true would add idle=poll + NTO's own C-state caps — we cap C-states below instead
    perPodPowerManagement: false
  # ONLY args NTO does not generate. NTO already generates, from the cpusets + realTime
  # hint + CPU-vendor include (never re-add — duplicate-arg drift, §1.2 / PARAMETERS.md §4):
  #   isolcpus=managed_irq / nohz=on / nohz_full / rcu_nocbs / tuned.non_isolcpus /
  #   systemd.cpu_affinity / hugepages args / nosoftlockup / skew_tick=1 /
  #   rcutree.kthread_prio=11 / tsc=reliable / nmi_watchdog=0 / mce=off /
  #   intel_iommu=on iommu=pt (Intel; iommu=pt on AMD) / intel_pstate|amd_pstate
  additionalKernelArgs:
    - "numa_balancing=disable"    # kernel auto-NUMA page migration fights static pinning
    - "pcie_aspm=off"             # no PCIe link power states — ASPM exit latency spikes GDR/NVMe
    - "rcu_nocb_poll"             # poll offloaded RCU callbacks instead of IPI-ing isolated cores
    - "intel_idle.max_cstate=1"   # enforce the §1.5 C-state latency policy from the kernel side
    - "processor.max_cstate=1"    # (drop both C-state args if idle power/thermals outweigh ITL jitter)
  # false: per-pod IRQ exclusion via the performance RuntimeClass + irq-load-balancing.crio.io
  # annotation on glm51-dynamo workers — the §3.3 low-latency pod contract. §10
  globallyDisableIrqLoadBalancing: false

tuned:
  enabled: true
  name: gpu-hpc-extras
  priority: 19
  # NTO names its generated profile openshift-node-performance-<performanceProfile.name>
  baseProfile: openshift-node-performance-gpu-hpc

# CRI-O memlock unlimited — ibverbs registration inside RDMA containers needs it. §1.3 / §10
crioMemlock:
  enabled: true

# RoCE host-side QoS (systemd oneshot, after network-online). Must mirror the switch fabric. §1.4 / §10
roceQos:
  enabled: true
  trafficClass: 106    # DSCP 26 + ECN  -> tc/1/traffic_class and cma_roce_tos
  cnpDscp: 48          # CNP marking -> ecn/roce_np/cnp_dscp (switch CNP queue mirrors this)
  cnpPriority: 6       # CNP egress priority -> ecn/roce_np/cnp_802p_prio
  pfcPriority: 3       # lossless priority
  mtu: 9000
