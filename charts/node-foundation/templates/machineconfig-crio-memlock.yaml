{{- if .Values.crioMemlock.enabled }}
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 99-{{ .Values.pool.roleLabel }}-crio-memlock
  labels:
    machineconfiguration.openshift.io/role: {{ .Values.pool.roleLabel }}
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /etc/crio/crio.conf.d/99-rdma-memlock.conf
          mode: 420
          overwrite: true
          contents:
            source: "data:text/plain;charset=utf-8;base64,{{ .Files.Get "files/crio-memlock.conf" | b64enc }}"
{{- end }}
