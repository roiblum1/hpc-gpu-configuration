apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: {{ .Values.lvmCluster.name }}
  namespace: {{ .Values.operator.namespace }}
spec:
  storage:
    deviceClasses:
      {{- range .Values.lvmCluster.deviceClasses }}
      {{- if ne .enabled false }}
      - name: {{ .name }}
        default: {{ .default }}
        fstype: {{ .fstype }}
        deviceSelector:
          paths:
            {{- range .paths }}
            - {{ . }}
            {{- end }}
        thinPoolConfig:
          name: {{ .thinPool.name }}
          sizePercent: {{ .thinPool.sizePercent }}
          overprovisionRatio: {{ .thinPool.overprovisionRatio }}
        nodeSelector:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/{{ $.Values.roleLabel }}
                  operator: Exists
      {{- end }}
      {{- end }}
