apiVersion: v2
name: glm51-dynamo
description: >-
  Phase 6 — GLM-5.1 served on Dynamo: the DynamoGraphDeployment for the interactive
  lane (Frontend + H200/FP8 prefill with KVBM + Blackwell/NVFP4 wide-EP decode) and an
