  upstream chart, referenced as an optional dependency (mirror it / git clone for disconnected).
type: application
version: 0.1.0
appVersion: "5.1"
keywords: [dynamo, vllm, glm, disaggregated, kvbm, moe, nvfp4, fp8]
# Ships ONLY our config (the DynamoGraphDeployments) so it renders standalone. The Dynamo
# platform (operator + etcd + NATS) is installed separately from its mirrored/cloned chart
# — see values.yaml `upstream:` and README. To vendor it as a subchart, add a `dependencies:`
# stanza pointing at your mirror, drop the chart into charts/, and run `helm dependency build`.
