{{- if .Values.batchLane.enabled }}
# Batch lane — smaller clone of the interactive DGD (aggregated shape). Same model
# + same weights LV; differs only in scheduling identity (serving-batch queue,
# preemptible priority) and engine tuning: MTP OFF, aggressive batching. §6.4
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: glm51-batch
  namespace: {{ .Values.namespace }}
spec:
  services:

    Frontend:
      replicas: {{ .Values.batchLane.frontendReplicas }}
      extraPodSpec:
        nodeSelector:
          {{ .Values.frontend.infraNodeLabel }}: ""
      mainContainer:
        args: ["--router-mode", "{{ .Values.frontend.routerMode }}"]
        resources:
          requests:
            cpu: "{{ .Values.frontend.resources.cpu }}"
            memory: {{ .Values.frontend.resources.memory }}

    GLM51Worker:
      replicas: {{ .Values.batchLane.workerReplicas }}
      multinode:
        nodeCount: {{ .Values.worker.nodeCount }}
      labels:
        kai.scheduler/queue: {{ .Values.queues.batch }}
      annotations:
        {{- if .Values.rails }}
        k8s.v1.cni.cncf.io/networks: {{ include "glm51.railAnnotation" . }}
        {{- end }}
        {{- include "glm51.lowLatencyAnnotations" . | nindent 8 }}
      extraPodSpec:
        schedulerName: {{ .Values.scheduler }}
        runtimeClassName: {{ .Values.runtimeClassName }}   # low-latency pod contract — §3.3
        priorityClassName: {{ .Values.priorityClasses.batch }}
        nodeSelector:
          gpu.hpc/sku: {{ .Values.sku.worker }}
        volumes:
          - name: models
            hostPath:
              path: {{ .Values.modelsHostPath }}
              type: Directory
      envs:
        {{- include "glm51.fabricEnv" . | nindent 8 }}
      mainContainer:
        args:
          - "--model"
          - "{{ .Values.modelPaths.fp8 }}"
          - "--tensor-parallel-size"
          - "{{ .Values.worker.tensorParallel }}"
          - "--enable-expert-parallel"
          - "--kv-cache-dtype"
          - "{{ .Values.worker.kvCacheDtype }}"
          - "--max-model-len"
          - "{{ .Values.maxModelLen }}"
          - "--enable-chunked-prefill"
          # MTP intentionally OFF on the batch lane (verification overhead beats batching gains at high batch)
        resources:
          limits:
            nvidia.com/gpu: {{ .Values.worker.resources.gpu }}
            {{- range .Values.rails }}
            openshift.io/{{ . }}: "1"
            {{- end }}
            cpu: "{{ .Values.worker.resources.cpu }}"
            memory: {{ .Values.worker.resources.memory }}
        volumeMounts:
          - {name: models, mountPath: /models, readOnly: true}
{{- end }}
