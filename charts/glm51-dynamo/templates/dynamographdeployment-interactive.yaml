# Interactive lane — aggregated shape (env/h200-2x-roce): each replica is one
# complete single-node TP8 engine; no prefill/decode split, no NIXL transfer.
# Flag names follow the doc shape (§6.4) — reconcile against your pinned Dynamo
# runtime recipe. Exact placement of volumes/priorityClassName in extraPodSpec
# depends on the operator version; this matches the documented shape.
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: glm51
  namespace: {{ .Values.namespace }}
spec:
  services:

    Frontend:
      replicas: {{ .Values.frontend.replicas }}
      extraPodSpec:
        nodeSelector:
          {{ .Values.frontend.infraNodeLabel }}: ""
      mainContainer:
        args: ["--router-mode", "{{ .Values.frontend.routerMode }}"]
        resources:
          requests:
            cpu: "{{ .Values.frontend.resources.cpu }}"
            memory: {{ .Values.frontend.resources.memory }}

    GLM51Worker:
      replicas: {{ .Values.worker.replicas }}
      multinode:
        nodeCount: {{ .Values.worker.nodeCount }}
      labels:
        kai.scheduler/queue: {{ .Values.queues.interactive }}
      annotations:
        {{- if .Values.rails }}
        k8s.v1.cni.cncf.io/networks: {{ include "glm51.railAnnotation" . }}
        {{- end }}
        {{- include "glm51.lowLatencyAnnotations" . | nindent 8 }}
      extraPodSpec:
        schedulerName: {{ .Values.scheduler }}
        runtimeClassName: {{ .Values.runtimeClassName }}   # low-latency pod contract — §3.3
        priorityClassName: {{ .Values.priorityClasses.interactive }}
        nodeSelector:
          gpu.hpc/sku: {{ .Values.sku.worker }}
        volumes:
          - name: models
            hostPath:
              path: {{ .Values.modelsHostPath }}
              type: Directory
          {{- if .Values.worker.kvbm.enabled }}
          # Per-pod, node-local KVBM disk tier. Generic ephemeral volume -> one PVC
          # per worker on the LVMS kvcache class (WaitForFirstConsumer, node-local).
          - name: kvdisk
            ephemeral:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: {{ .Values.worker.kvbm.diskPvc.storageClass }}
                  resources:
                    requests:
                      storage: {{ .Values.worker.kvbm.diskPvc.size }}
          {{- end }}
      envs:
        {{- include "glm51.fabricEnv" . | nindent 8 }}
        {{- if .Values.worker.kvbm.enabled }}
        - {name: DYN_KVBM_CPU_CACHE_GB,  value: "{{ .Values.worker.kvbm.cpuCacheGb }}"}
        - {name: DYN_KVBM_DISK_CACHE_GB, value: "{{ .Values.worker.kvbm.diskCacheGb }}"}
        - {name: DYN_KVBM_LEADER_WORKER_INIT_TIMEOUT_SECS, value: "{{ .Values.worker.kvbm.initTimeoutSecs }}"}
        {{- end }}
      mainContainer:
        args:
          - "--model"
          - "{{ .Values.modelPaths.fp8 }}"
          - "--tensor-parallel-size"
          - "{{ .Values.worker.tensorParallel }}"
          - "--enable-expert-parallel"
          - "--kv-cache-dtype"
          - "{{ .Values.worker.kvCacheDtype }}"
          - "--max-model-len"
          - "{{ .Values.maxModelLen }}"
          - "--enable-chunked-prefill"
          {{- if .Values.worker.kvbm.enabled }}
          - "--connector"
          - "kvbm"
          {{- end }}
          - "--speculative-config"
          - "num_speculative_tokens={{ .Values.worker.speculativeTokens }}"   # 1 MTP head — interactive only
        resources:
          limits:
            nvidia.com/gpu: {{ .Values.worker.resources.gpu }}
            {{- range .Values.rails }}
            openshift.io/{{ . }}: "1"
            {{- end }}
            cpu: "{{ .Values.worker.resources.cpu }}"
            memory: {{ .Values.worker.resources.memory }}
        volumeMounts:
          - {name: models, mountPath: /models, readOnly: true}
          {{- if .Values.worker.kvbm.enabled }}
          - {name: kvdisk, mountPath: /kvbm-disk}
          {{- end }}
