# Phase 0 — model weight staging. Source: §0.
# ENV BRANCH env/h100-8x-ib: MiniMax M2.7 (FP8) + the DFlash draft — a mirror of
# z-lab/MiniMax-M2.7-DFlash (https://huggingface.co/z-lab/MiniMax-M2.7-DFlash).
# Worker pods (minimax-dynamo) mount hostPath:{{ hostPath }} read-only.

roleLabel: gpu-hpc
hostPath: /var/lib/models          # dedicated 'models' LV, separate from the KV-cache LV (§0 / §4)

# Image with skopeo (+ rsync) available, pulled from your mirror.
image: <your-registry>/tools/skopeo:latest

# Where staged weights come from. Stage once, reference by digest.
source:
  type: oci                        # oci | rsync
  registry: <your-registry>/models # for type=oci: docker://<registry>/<ref>
  rsyncBase: rsync://artifacts/models   # for type=rsync

# Local dir name -> matches minimax-dynamo modelPaths (/models/<name>).
# The draft is small next to the base model — stage it everywhere for free.
models:
  - {name: minimax-m2.7,        ref: "minimax-m2.7@sha256:REPLACE"}
  - {name: minimax-m2.7-dflash, ref: "minimax-m2.7-dflash@sha256:REPLACE"}   # z-lab/MiniMax-M2.7-DFlash mirror

resources:
  requests: {cpu: "2", memory: 4Gi}
