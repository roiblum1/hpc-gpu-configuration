# Source: sriov-rails/templates/sriovnetwork.yaml
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetwork
metadata:
  name: rail0
  namespace: openshift-sriov-network-operator
spec:
  resourceName: rail0
  networkNamespace: glm-serving
  trust: "on"
  spoofChk: "off"
  # IPAM built from values.rails[*]:
  #  - numbered /31 point-to-point ON the VF -> set `address` (+ `gateway` = the /31 peer): static
  #  - shared per-rail endpoint pool         -> set `range`   (+ optional `gateway`):      whereabouts
  # `routes` (dst-only = on-link) emitted when set; omit `gateway` for BGP-unnumbered (link-local).
  ipam: |
    {"addresses":[{"address":"192.168.117.1/31","gateway":"192.168.117.0"}],"routes":[{"dst":"192.168.0.0/24"}],"type":"static"}
  metaPlugins: ""
---
# Source: sriov-rails/templates/sriovnetworknodepolicy.yaml
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetworkNodePolicy
metadata:
  name: rail0
  namespace: openshift-sriov-network-operator
spec:
  resourceName: rail0             # -> openshift.io/rail0
  nodeSelector:
    node-role.kubernetes.io/gpu-hpc: ""
  priority: 90
  numVfs: 1
  nicSelector:
    pfNames: ["ens1f0np0"]              # rail rail0 on socket 0
  deviceType: netdevice                   # NOT vfio — kernel netdev + RDMA
  isRdma: true
  linkType: eth
  mtu: 9000